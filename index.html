<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stir</title>
    <link rel="icon" href="./src/imges/icon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wdth,wght@75..100,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css"
    />
    <link rel="stylesheet" href="./src/css/index.css" />
  </head>
  <body>
    <!-- ======================================== header ======================================================= -->
    <header class="header">
      <div class="wrapper header-wrapper">
        <a class="logo" href="#"
          ><img src="./src/imges/logo.svg" alt="Stir logo"
        /></a>
        <button class="header-action">Join our team</button>
      </div>
    </header>
    <main>
      <!-- ======================================== hero ======================================================== -->
      <section class="hero">
        <div class="wrapper hero-wrapper">
          <h1 class="hero-title">Where creators run their business.</h1>
          <p class="hero-text">
            Meet Stir. The financial studio for collaborating, splitting
            revenue, money management and metrics—all in one place
          </p>
          <form class="contact-form">
            <input
              class="contact-form-email"
              type="email"
              placeholder="Enter your email"
            />
            <button class="contact-form-buttom">Get started</button>
          </form>
        </div>
      </section>
      <section class="creators">
        <!-- Slider main container -->
        <div class="swiper-creators">
          <!-- Additional required wrapper -->
          <div class="swiper-wrapper">
            <!-- Slides -->
            <div class="swiper-slide">
              <article class="creator">
                <div class="creator-info">
                  <h2 class="creator-name">Anna</h2>
                  <p class="creator-role">Podcaster</p>
                </div>
                <div class="creator-photo">
                  <img
                    class="creator-img"
                    src="./src/imges/1_slider.png"
                    alt="photo"
                  />
                </div>
                <ul class="creator-social">
                  <li class="creator-social-item">
                    <a class="creator-social-link" href="#">
                      <img
                        class="creator-social-icon"
                        src="./src/imges/youtube.svg"
                        alt="youtube"
                      />
                    </a>
                  </li>
                  <li class="creator-social-item">
                    <a class="creator-social-link" href="#">
                      <img
                        class="creator-social-icon"
                        src="./src/imges/instagram.svg"
                        alt="instagram"
                      />
                    </a>
                  </li>
                </ul>
              </article>
            </div>
            <div class="swiper-slide">
              <article class="creator">
                <div class="creator-info">
                  <h2 class="creator-name">Airrack</h2>
                  <p class="creator-role">Youtuber</p>
                </div>
                <div class="creator-photo">
                  <img
                    class="creator-img"
                    src="./src/imges/2_slider.png"
                    alt="photo"
                  />
                </div>
                <ul class="creator-social">
                  <li class="creator-social-item">
                    <a class="creator-social-link" href="#">
                      <img
                        class="creator-social-icon"
                        src="./src/imges/youtube.svg"
                        alt="youtube"
                      />
                    </a>
                  </li>
                </ul>
              </article>
            </div>
            <div class="swiper-slide">
              <article class="creator creator-revers">
                <div class="creator-info">
                  <h2 class="creator-name">Liza Koshy</h2>
                  <p class="creator-role">Creator</p>
                </div>
                <div class="creator-photo">
                  <img
                    class="creator-img"
                    src="./src/imges/3_slider.png"
                    alt="photo"
                  />
                </div>
                <ul class="creator-social">
                  <li class="creator-social-item">
                    <a class="creator-social-link" href="#">
                      <img
                        class="creator-social-icon"
                        src="./src/imges/instagram.svg"
                        alt="instagram"
                      />
                    </a>
                  </li>
                  <li class="creator-social-item">
                    <a class="creator-social-link" href="#">
                      <img
                        class="creator-social-icon"
                        src="./src/imges/youtube.svg"
                        alt="youtube"
                      />
                    </a>
                  </li>
                  <li class="creator-social-item">
                    <a class="creator-social-link" href="#">
                      <img
                        class="creator-social-icon"
                        src="./src/imges/twitter.svg"
                        alt="twitter"
                      />
                    </a>
                  </li>
                </ul>
              </article>
            </div>
            <div class="swiper-slide">
              <article class="creator">
                <div class="creator-info">
                  <h2 class="creator-name">Peter Hollens</h2>
                  <p class="creator-role">Musician</p>
                </div>
                <div class="creator-photo">
                  <img
                    class="creator-img"
                    src="./src/imges/4_slider.png"
                    alt="photo"
                  />
                </div>
                <ul class="creator-social">
                  <li class="creator-social-item">
                    <a class="creator-social-link" href="#">
                      <img
                        class="creator-social-icon"
                        src="./src/imges/youtube.svg"
                        alt="youtube"
                      />
                    </a>
                  </li>
                  <li class="creator-social-item">
                    <a class="creator-social-link" href="#">
                      <img
                        class="creator-social-icon"
                        src="./src/imges/shopify.svg"
                        alt="shopify"
                      />
                    </a>
                  </li>
                </ul>
              </article>
            </div>
            <div class="swiper-slide">
              <article class="creator">
                <div class="creator-info">
                  <h2 class="creator-name">Jessica</h2>
                  <p class="creator-role">Streamer</p>
                </div>
                <div class="creator-photo">
                  <img
                    class="creator-img"
                    src="./src/imges/5_slider.png"
                    alt="photo"
                  />
                </div>
                <ul class="creator-social">
                  <li class="creator-social-item">
                    <a class="creator-social-link" href="#">
                      <img
                        class="creator-social-icon"
                        src="./src/imges/youtube.svg"
                        alt="youtube"
                      />
                    </a>
                  </li>
                  <li class="creator-social-item">
                    <a class="creator-social-link" href="#">
                      <img
                        class="creator-social-icon"
                        src="./src/imges/instagram.svg"
                        alt="instagram"
                      />
                    </a>
                  </li>
                </ul>
              </article>
            </div>
          </div>
        </div>
      </section>
    </main>
    <span class="badge badge-home"> holme </span>
    <span class="badge badge-pay"> home </span>
    <span class="badge badge-collectives"> home </span>
    <span class="badge badge-splits"> home </span>

    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
    <script src="./src/js/swiper-creators.js" type="module"></script>
  </body>
</html>
